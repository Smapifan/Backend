name: Repository Automation

on:
  issues:
    types: [opened, reopened, labeled, unlabeled, assigned, unassigned, milestoned, demilestoned, edited, deleted, transferred, pinned, unpinned, locked, unlocked, closed]
  pull_request:
    types: [closed]
  push:
    branches: [main, master]
  schedule:
    # Runs daily at 02:00 UTC
    - cron: '0 2 * * *'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – Issue opened: create feature branch + draft PR
# Each issue gets its own concurrency slot so up to 50 issues triggered within
# seconds of each other all run in parallel without blocking one another.
# Duplicate runs for the *same* issue are queued (not cancelled).
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  create-branch-and-pr:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    # One slot per issue number → parallel across different issues, serialised per issue
    concurrency:
      group: create-branch-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository (needed for script file)
        uses: actions/checkout@v4

      - name: Create feature branch and draft PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./.github/scripts/create-branch-and-pr.js');
            await run({ github, context, core });

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 – PR merged: close linked issues + delete feature branch
# ─────────────────────────────────────────────────────────────────────────────
  cleanup-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Close linked issues and delete feature branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const branchName = pr.head.ref;

            // ── 1. Delete the feature branch ──────────────────────────────────
            try {
              await github.rest.git.deleteRef({
                ...repo,
                ref: `heads/${branchName}`,
              });
              console.log(`Deleted branch: ${branchName}`);
            } catch (e) {
              console.warn(`Could not delete branch "${branchName}": ${e.message}`);
            }

            // ── 2. Close any issues referenced in the PR body ─────────────────
            //   Supports: closes/close/closed/fix/fixes/fixed/resolve/resolves/resolved #N
            const body = pr.body || '';
            const pattern = /(?:closes?|closed|fix(?:es|ed)?|resolves?|resolved)\s+#(\d+)/gi;
            const matched = new Set();
            let m;
            while ((m = pattern.exec(body)) !== null) {
              matched.add(parseInt(m[1], 10));
            }

            // Also close an issue whose number matches the branch name pattern issue-N
            const branchMatch = branchName.match(/^issue-(\d+)$/);
            if (branchMatch) {
              matched.add(parseInt(branchMatch[1], 10));
            }

            for (const issueNumber of matched) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  ...repo,
                  issue_number: issueNumber,
                });
                if (issue.state === 'open') {
                  await github.rest.issues.update({
                    ...repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  await github.rest.issues.createComment({
                    ...repo,
                    issue_number: issueNumber,
                    body: [
                      `🤖 **Issue closed automatically.**`,
                      ``,
                      `This issue was resolved and closed after PR #${pr.number} was merged.`,
                    ].join('\n'),
                  });
                  console.log(`Closed issue #${issueNumber}`);
                } else {
                  console.log(`Issue #${issueNumber} is already closed – skipping.`);
                }
              } catch (e) {
                console.warn(`Could not process issue #${issueNumber}: ${e.message}`);
              }
            }

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 – Repo cleanup: remove junk files on push to default branch or daily
# ─────────────────────────────────────────────────────────────────────────────
  repo-cleanup:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Remove unnecessary files and directories
        run: |
          echo "=== Scanning for unnecessary files ==="

          # ── Junk files (searched recursively across the whole tree) ──────────
          find . \
            -not -path './.git/*' \
            \( \
              -name '*.log'          \
              -o -name '*.tmp'       \
              -o -name '*~'          \
              -o -name '*.bak'       \
              -o -name '.DS_Store'   \
              -o -name 'Thumbs.db'   \
              -o -name '*.swp'       \
              -o -name '*.swo'       \
              -o -name '*.pyc'       \
              -o -name '*.pyo'       \
              -o -name 'ehthumbs.db' \
              -o -name 'desktop.ini' \
            \) -print -delete

          # ── Junk directories ──────────────────────────────────────────────────
          for dir_name in \
            node_modules \
            .vscode \
            tmp \
            __pycache__ \
            .pytest_cache \
            .mypy_cache \
            .cache \
            .nyc_output \
          ; do
            find . -not -path './.git/*' -type d -name "$dir_name" -prune -print \
              -exec rm -rf '{}' \;
          done

          echo "=== Scan complete ==="

      - name: Commit and push if changes exist
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: auto-cleanup unnecessary files"
            git push
            echo "Cleanup commit pushed."
          else
            echo "Nothing to clean up – repo is already tidy."
          fi
