name: Issue → Branch & PR

on:
  issues:
    types: [opened]

jobs:
  create-branch-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Create feature branch and draft PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const branchName = `issue-${issue.number}`;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            // Resolve default branch
            const { data: repoData } = await github.rest.repos.get(repo);
            const defaultBranch = repoData.default_branch;

            // Get SHA of the default branch tip
            const { data: ref } = await github.rest.git.getRef({
              ...repo,
              ref: `heads/${defaultBranch}`,
            });
            const baseSha = ref.object.sha;

            // Create the feature branch
            await github.rest.git.createRef({
              ...repo,
              ref: `refs/heads/${branchName}`,
              sha: baseSha,
            });
            console.log(`Created branch: ${branchName}`);

            // Add a tracking file so the branch differs from base
            const fileContent = [
              `# Issue #${issue.number}: ${issue.title}`,
              ``,
              `**Opened by:** @${issue.user.login}`,
              `**URL:** ${issue.html_url}`,
              ``,
              `## Description`,
              ``,
              issue.body || '_No description provided._',
            ].join('\n');

            await github.rest.repos.createOrUpdateFileContents({
              ...repo,
              path: `.github/issues/issue-${issue.number}.md`,
              message: `chore: track issue #${issue.number} – ${issue.title}`,
              content: Buffer.from(fileContent).toString('base64'),
              branch: branchName,
              committer: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com',
              },
              author: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com',
              },
            });
            console.log(`Created tracking file for issue #${issue.number}`);

            // Open a draft PR referencing the issue
            const prBody = [
              `Closes #${issue.number}`,
              ``,
              `---`,
              `> 🤖 This pull request was automatically generated for issue #${issue.number}.`,
              `> Implement your changes on the \`${branchName}\` branch, then mark this PR as ready for review.`,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              ...repo,
              title: `fix: resolve issue #${issue.number} – ${issue.title}`,
              body: prBody,
              head: branchName,
              base: defaultBranch,
              draft: true,
            });
            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

            // Comment on the issue with links
            await github.rest.issues.createComment({
              ...repo,
              issue_number: issue.number,
              body: [
                `🤖 **Automated setup complete!**`,
                ``,
                `| | |`,
                `|---|---|`,
                `| **Branch** | [\`${branchName}\`](${pr.html_url}) |`,
                `| **Pull Request** | [#${pr.number}](${pr.html_url}) |`,
                ``,
                `Push your changes to \`${branchName}\` and the PR will be ready for review.`,
                `The issue will be closed automatically when the PR is merged.`,
              ].join('\n'),
            });
